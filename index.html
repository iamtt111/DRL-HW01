<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網格地圖 - 深度強化學習 HW1</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <div class="container">
        <h1>網格地圖 - 深度強化學習 HW1</h1>

        <div class="main-layout">
            <!-- 左側：說明與資訊 -->
            <div class="left-panel">
                <!-- 使用說明 -->
                <div class="instructions">
                    <h3>使用說明</h3>
                    <ol>
                        <li>選擇網格大小，點擊「初始化」</li>
                        <li>設置起點、終點與障礙物</li>
                        <li>生成隨機策略或執行 Value Iteration</li>
                        <li>評估策略查看 V(s) 值</li>
                        <li>播放路徑動畫觀察結果</li>
                    </ol>
                </div>

                <!-- 圖例 -->
                <div class="legend">
                    <h3>圖例</h3>
                    <div class="legend-items">
                        <div class="legend-item">
                            <div class="legend-box start-cell"></div>
                            <span>起點</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-box end-cell"></div>
                            <span>終點</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-box obstacle-cell"></div>
                            <span>障礙物</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-box normal-cell"></div>
                            <span>空白</span>
                        </div>
                    </div>
                </div>

                <!-- 狀態資訊 -->
                <div class="info-panel">
                    <h3>狀態</h3>
                    <p id="modeInfo">模式：未選擇</p>
                    <p id="obstacleCount">障礙物：0 / 0</p>
                    <p id="statusInfo">請初始化網格</p>
                </div>
            </div>

            <!-- 中間：控制面板 -->
            <div class="center-panel">
                <!-- Step 1: 設置環境 -->
                <div class="step-section">
                    <div class="step-header">
                        <span class="step-number">1</span>
                        <span class="step-title">設置環境</span>
                    </div>
                    <div class="step-content">
                        <div class="grid-size-control">
                            <label for="gridSize">網格大小：</label>
                            <input type="number" id="gridSize" min="5" max="9" value="5">
                            <button id="initBtn" class="btn btn-primary">初始化</button>
                        </div>
                        <div class="mode-section">
                            <label>編輯模式：</label>
                            <div class="mode-buttons">
                                <button id="startModeBtn" class="btn mode-btn">起點</button>
                                <button id="endModeBtn" class="btn mode-btn">終點</button>
                                <button id="obstacleModeBtn" class="btn mode-btn">障礙物</button>
                                <button id="eraseModeBtn" class="btn mode-btn">清除</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Step 2: 執行算法 -->
                <div class="step-section">
                    <div class="step-header">
                        <span class="step-number">2</span>
                        <span class="step-title">執行算法</span>
                    </div>
                    <div class="step-content">
                        <div class="algorithm-buttons">
                            <button id="randomPolicyBtn" class="btn btn-success">隨機策略 + 評估</button>
                            <button id="valueIterationBtn" class="btn btn-vi">Value Iteration</button>
                        </div>
                        <div class="iteration-display">
                            <p id="iterationInfo">迭代: <strong>0</strong> | Δ: <strong>-</strong></p>
                        </div>
                    </div>
                </div>

                <!-- Step 3: 視覺化 -->
                <div class="step-section">
                    <div class="step-header">
                        <span class="step-number">3</span>
                        <span class="step-title">視覺化</span>
                    </div>
                    <div class="step-content">
                        <div class="animation-buttons">
                            <button id="animatePathBtn" class="btn btn-animate">播放路徑</button>
                            <button id="stopViBtn" class="btn btn-danger" disabled>停止</button>
                        </div>
                        <div class="speed-control">
                            <label for="viSpeedSlider">速度：</label>
                            <input type="range" id="viSpeedSlider" min="10" max="100" value="50">
                            <span id="viSpeedValue">50%</span>
                        </div>
                    </div>
                </div>

                <!-- 重置按鈕 -->
                <button id="resetBtn" class="btn btn-warning btn-reset">重置所有</button>
            </div>

            <!-- 右側：Grid -->
            <div class="right-panel">
                <div id="gridContainer" class="grid-container">
                    <!-- 網格將由 JavaScript 動態生成 -->
                </div>
            </div>
        </div>
    </div>

    <script src="static/js/main.js"></script>
</body>

</html>
